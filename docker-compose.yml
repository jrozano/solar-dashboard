services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ssd-solar-backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    networks:
      - ssd-net

  siddhi-tooling:
    image: docker.io/wso2/wso2sp-editor:4.4.0
    container_name: ssd-solar-siddhi-editor
    restart: unless-stopped
    ports:
      - "${SIDDHI_EDITOR_PORT:-9390}:9390"
    volumes:
      - ./siddhi/apps/SolarAlerts.siddhi:/home/wso2carbon/wso2sp-4.4.0/wso2/editor/deployment/workspace/SolarAlerts.siddhi:rw,Z
    environment:
      - WSO2_SERVER_PROFILE=editor
    deploy:
      resources:
        limits:
          memory: 2G
    networks:
      - ssd-net

networks:
  ssd-net:
    driver: bridge
