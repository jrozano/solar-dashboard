<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>SSD Solar Dashboard</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <!-- Login screen (visible when not authenticated) -->
    <div id="loginScreen">
      <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#1a73e8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <h2>SSD Solar Dashboard</h2>
      <p>Monitor your solar production in real time</p>
      <a href="/api/login" class="google-btn">
        <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59a14.5 14.5 0 0 1 0-9.18l-7.98-6.19a24.01 24.01 0 0 0 0 21.56l7.98-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Sign in with Google
      </a>
    </div>

    <!-- Authenticated content -->
    <header id="appHeader" class="hidden">
      <h1>☀️ Dashboard</h1>
      <div id="userArea"></div>
    </header>
    <div id="authWall" class="hidden">
    <div class="main">
      <!-- Sensor cards -->
      <div class="card">
        <h3>⚡ Current Values</h3>
        <div id="sensorGrid" class="sensor-grid">
          <p class="no-alerts">Loading data…</p>
        </div>
      </div>

      <div class="grid">
        <!-- CEP Alerts -->
        <div class="card">
          <div class="cep-header">
            <h3>🚨 CEP Alerts</h3>
            <button class="cep-clear-btn" id="cepClearBtn">Clear</button>
          </div>
          <div id="cepAlertsList"></div>
        </div>

        <!-- API Keys -->
        <div class="card" id="apiKeyCard">
          <h3>🔑 API Keys</h3>
          <p class="key-description">Generate keys to access <code>/stats</code> and <code>/alerts</code> without browser session.</p>
          <form id="keyForm" class="key-form">
            <label>Name: <input type="text" id="keyName" placeholder="my-script" required class="key-input"></label>
            <button type="submit">Generate API Key</button>
          </form>
          <div id="keysList"></div>
        </div>
      </div>
    </div>
    </div><!-- /authWall -->

    <script src="app.js"></script>
  </body>
</html>
